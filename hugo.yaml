baseURL: https://aymenmastouri.io
languageCode: en
title: "Aymen Mastouri"
copyright: "© 2026 Aymen Mastouri"

module:
  imports:
    - path: github.com/nunocoracao/blowfish/v2

defaultContentLanguage: en
enableEmoji: true
enableRobotsTXT: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
  tableOfContents:
    startLevel: 2
    endLevel: 4

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  tag: tags
  category: categories

params:
  colorScheme: blowfish
  defaultAppearance: dark
  autoSwitchAppearance: true
  enableSearch: true
  enableCodeCopy: true

  header:
    layout: fixed

  footer:
    showCopyright: true
    showThemeAttribution: false
    showScrollToTop: true

  homepage:
    layout: profile
    homepageImage: img/aymen.png
    showRecent: true
    recentLimit: 4

  article:
    showDate: true
    showReadingTime: true
    showTableOfContents: true
    showTaxonomies: true
    showWordCount: false
    showEdit: false
    showBreadcrumbs: true

  author:
    name: "Aymen Mastouri"
    image: "img/aymen.png"
    headline: "Lead Solution Architect | Enterprise & AI"
    bio: "10+ years leading enterprise architecture & delivery. Currently integrating AI into complex systems — RAG, LLM-based pipelines, SDLC automation. Building sovereign AI platforms on self-hosted Kubernetes with full GitOps and observability."
    links:
      - github: https://github.com/aymenmastouri
      - linkedin: https://linkedin.com/in/aymen-mastouri
      - email: mailto:aymen@aymenmastouri.io
      - globe: https://ai.aymenmastouri.io

menus:
  main:
    - name: About
      pageRef: about
      weight: 1
    - name: Projects
      pageRef: projects
      weight: 2
    - name: Blog
      pageRef: blog
      weight: 3
